<span class="post-country" country-value="{{ include.country | downcase }}">
  {% case include.country %}
  {% when 'FR' %}
      🇫🇷 France
    {% when 'JP' %}
      🇯🇵 Japon
    {% when 'US' %}
      🇺🇸 Amérique
    {% when 'KR' %}
      🇰🇷 Corée
    {% when 'IS' %}
      🇮🇸 Islande
    {% when 'DE' %}
      🇩🇪 Allemagne
    {% else %}
  {% endcase %}
</span>
